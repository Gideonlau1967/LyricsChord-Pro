<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Song Studio Pro V2.0 | Setlist Manager</title>
    <link rel="stylesheet" href="style.css">
    <!-- Required Libraries -->
    <script src="https://cdn.jsdelivr.net/npm/pptxgenjs@3.12.0/dist/pptxgen.bundle.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

<div class="app-container">
    <header class="app-header">
        <div class="brand-group">
            <img src="assets/TOP-logo.png" alt="Logo" class="app-logo">
            <div class="brand-stack">
                <h1 class="brand">Chord-Lyrics Studio</h1>
                <span class="version-badge" id="vBadge">V2.0-PRO</span>
            </div>
        </div>
    
        <div class="header-actions">
            <input type="file" id="importPptx" accept=".pptx" style="display: none;">
            <button onclick="document.getElementById('importPptx').click()" class="secondary-btn">Import PPTX</button>
            
            <div class="dropdown">
                <button class="generate-btn">Download PowerPoint ▾</button>
                <div class="dropdown-content">
                    <a href="#" id="downloadCurrent">Current Song Only</a>
                    <a href="#" id="downloadSetlist">Entire Setlist (.pptx)</a>
                </div>
            </div>
        </div>
    </header>

    <main class="workspace">
        <!-- LEFT: SETLIST SIDEBAR -->
        <aside class="setlist-sidebar">
            <div class="sidebar-header">
                <span class="compact-label">My Setlist</span>
                <button id="btnAddSong" class="st-btn-sm">+ Add</button>
            </div>
            <div id="setlistItems" class="setlist-items">
                <!-- Songs injected by script.js -->
            </div>
        </aside>

        <!-- CENTER: EDITOR -->
        <section class="editor-side">
            <div class="editor-section">
                <div class="meta-row">
                    <div style="flex: 2;">
                        <label class="compact-label">Song Title</label>
                        <input type="text" id="valTitle" class="st-input" placeholder="Enter title...">
                    </div>
                    <div style="flex: 1;">
                        <label class="compact-label">Copyright</label>
                        <input type="text" id="valCopy" class="st-input" placeholder="© Info">
                    </div>
                </div>
            </div>
            
            <div class="lyrics-container">
                <label class="compact-label">Lyrics & Chords Editor</label>
                <textarea id="valLyrics" class="st-textarea" placeholder="[Verse 1]
G           C
Lyrics start here..."></textarea>
            </div>
        </section>

        <!-- RIGHT: PREVIEW -->
        <section class="preview-side">
            <div class="slide-wrapper">
                <div id="slideMock" class="slide-mock">
                    <div id="prevTitle" class="element"></div>
                    <div id="prevLyrics" class="element"></div>
                    <div id="prevCopy" class="element"></div>
                </div>
                <div class="preview-nav">
                    <button id="prevSlide" class="nav-btn">⟵</button>
                    <span id="slideIndicator">Slide 1 / 1</span>
                    <button id="nextSlide" class="nav-btn">⟶</button>
                    <button id="btnFullScreen" class="nav-btn fs-toggle">⛶ Fullscreen</button>
                </div>
            </div>
        </section>
    </main>

    <footer class="utility-dashboard">
        <!-- BG GALLERY -->
        <div class="dash-section bg-gallery-section">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;">
                <label class="compact-label" style="margin: 0;">Backgrounds</label>
                <div style="display: flex; gap: 5px;">
                    <button id="btnBgUp" class="st-btn-sm">▲</button>
                    <button id="btnBgDown" class="st-btn-sm">▼</button>
                </div>
            </div>
            <div id="bgSelector" class="bg-gallery-matrix">
                <!-- Thumbs injected by script.js -->
            </div>
        </div>

        <!-- CONTROLS -->
        <div class="dash-section controls-section">
            <div class="meta-row" style="margin-bottom: 12px;">
                <div style="flex: 1.2;">
                    <label class="compact-label">Text Colors</label>
                    <div class="color-grid">
                        <div class="color-item"><span>Title</span><input type="color" id="colTitle" value="#000000"></div>
                        <div class="color-item"><span>Lyrics</span><input type="color" id="colLyrics" value="#000000"></div>
                        <div class="color-item"><span>Chords</span><input type="color" id="colChords" value="#2563eb"></div>
                        <div class="color-item"><span>Copy</span><input type="color" id="colCopy" value="#64748b"></div>
                    </div>
                </div>
                <div style="flex: 1;">
                    <label class="compact-label">Transpose & Align</label>
                    <div class="transpose-controls">
                        <button id="btnDown" class="st-btn-sm">-1</button>
                        <span id="keyShift">Shift: 0</span>
                        <button id="btnUp" class="st-btn-sm">+1</button>
                        <button id="btnGlobalTranspose" class="st-btn-sm" style="color:var(--accent); margin-left:4px;">Global</button>
                    </div>
                    <select id="slideAlign" class="st-select" style="margin-top:6px;">
                        <option value="center">Center Align</option>
                        <option value="left">Left Align</option>
                    </select>
                </div>
            </div>

            <div class="sliders-block">
                <label class="compact-label">Layout Positioning & Chord Gap</label>
                <div class="sliders-grid">
                    <div class="slider-box"><span>Title Y%</span><input type="range" id="yTitle" min="0" max="100" value="2"></div>
                    <div class="slider-box"><span>Lyrics Y%</span><input type="range" id="yLyrics" min="0" max="100" value="20"></div>
                    <div class="slider-box"><span>Copy Y%</span><input type="range" id="yCopy" min="0" max="100" value="93"></div>
                    <div class="slider-box"><span>Chord Gap</span><input type="range" id="chordGap" min="0" max="30" value="8"></div>
                </div>
            </div>
        </div>
    </footer>
</div>

<script src="script.js"></script>
</body>
</html>
