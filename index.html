<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Song PPTX Studio</title>
    <link rel="stylesheet" href="style.css">
    <!-- PptxGenJS Library -->
    <script src="https://cdn.jsdelivr.net/npm/pptxgenjs@3.12.0/dist/pptxgen.bundle.js"></script>
    <!-- Google Fonts: Inter for UI -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <div class="app-wrapper">
        
        <!-- LEFT: CONTROLS (Sidebar) -->
        <aside class="sidebar">
            <div class="brand-container">
                <h2 class="brand">Song Studio</h2>
                <span id="appVersion" class="version-badge">v1.2.7-DEBUG</span>
            </div>

            <div class="scroll-area">
                <!-- Section: Song Content -->
                <section class="control-section">
                    <h3 class="section-title">Song Content</h3>
                    
                    <div class="field-group">
                        <label for="valTitle">Song Title</label>
                        <input type="text" id="valTitle" value="Amazing Grace" placeholder="Enter title..." class="main-input">
                    </div>

                    <div class="field-group">
                        <label for="valLyrics">Lyrics & Chords</label>
                        <!-- rows="10" provides vertical space for ~10 lines -->
                        <textarea id="valLyrics" rows="10" class="main-textarea" placeholder="[Verse 1]...">[Verse 1]
G              C                    G            D
Amazing Grace, how sweet the sound</textarea>
                    </div>

                    <div class="field-group">
                        <label for="valCopy">Copyright Info</label>
                        <input type="text" id="valCopy" value="© 2024 Public Domain" placeholder="Copyright line..." class="main-input">
                    </div>
                </section>

                <!-- Section: Slide Design -->
                <section class="control-section">
                    <h3 class="section-title">Slide Design</h3>
                    
                    <div class="field-group">
                        <label>Background Theme</label>
                        <div id="bgSelector" class="bg-grid">
                            <!-- Background thumbnails generated by script.js -->
                        </div>
                    </div>

                    <div class="field-group">
                        <label for="slideAlign">Text Alignment</label>
                        <select id="slideAlign" class="main-select">
                            <option value="center">Center Aligned</option>
                            <option value="left">Left Aligned</option>
                        </select>
                    </div>

                    <div class="field-group">
                        <label>Layout Positioning & Gaps</label>
                        <div class="slider-item">
                            <span>Title Y%</span>
                            <input type="range" id="yTitle" min="0" max="100" value="8">
                        </div>
                        <div class="slider-item">
                            <span>Lyrics Y%</span>
                            <input type="range" id="yLyrics" min="0" max="100" value="30">
                        </div>
                        <div class="slider-item">
                            <span>Copyright Y%</span>
                            <input type="range" id="yCopy" min="0" max="100" value="85">
                        </div>
                        <div class="slider-item">
                            <span>Chord Gap</span>
                            <input type="range" id="chordGap" min="0" max="50" value="0">
                        </div>
                    </div>
                </section>
            </div>

            <!-- Footer Action Area -->
            <div class="action-area">
                <button id="downloadBtn" class="generate-btn">
                    <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path>
                    </svg>
                    Download PowerPoint
                </button>
            </div>
        </aside>

        <!-- RIGHT: LIVE PREVIEW -->
        <main class="preview-area">
            <div class="preview-container">
                <div id="slideMock" class="slide-mock">
                    <div id="prevTitle" class="element title-prev"></div>
                    <div id="prevLyrics" class="element lyrics-prev"></div>
                    <div id="prevCopy" class="element copy-prev"></div>
                </div>
                <p class="preview-hint">Live Preview (16:9 Aspect Ratio)</p>
            </div>
        </main>

    </div>

    <!-- Main Logic Script -->
    <script src="script.js"></script>
</body>
</html>
