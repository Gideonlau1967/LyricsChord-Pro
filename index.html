<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Song Studio Pro</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/pptxgenjs@3.12.0/dist/pptxgen.bundle.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>

<div class="app-container">
    
    <!-- HEADER -->
    <header class="app-header">
        <h1 class="brand">Song Studio <span class="version-badge">v1.3.4-DEBUG</span></h1>
        <button id="downloadBtn" class="generate-btn">Download PowerPoint</button>
    </header>

    <!-- TOP WORKSPACE (60% Height, 50/50 Split) -->
    <main class="workspace">
        
        <!-- LEFT: EDITOR -->
        <aside class="editor-side">
            <div class="editor-section">
                <label class="compact-label">Song Metadata</label>
                <div class="meta-row">
                    <input type="text" id="valTitle" value="Amazing Grace" placeholder="Song Title" class="st-input">
                    <input type="text" id="valCopy" value="© 2024 Public Domain" placeholder="Copyright Info" class="st-input">
                </div>
            </div>
            
            <div class="lyrics-container">
                <label class="compact-label">Lyrics & Chords Editor</label>
                <textarea id="valLyrics" class="st-textarea" placeholder="Enter chords and lyrics here...">[Verse 1]
G              C                    G            D
Amazing Grace, how sweet the sound</textarea>
            </div>
        </aside>

        <!-- RIGHT: PREVIEW -->
        <section class="preview-side">
            <div class="slide-wrapper">
                <div id="slideMock" class="slide-mock">
                    <div id="prevTitle" class="element"></div>
                    <div id="prevLyrics" class="element"></div>
                    <div id="prevCopy" class="element"></div>
                </div>
                <p class="stage-label">Live Slide Preview (16:9)</p>
            </div>
        </section>
    </main>

    <!-- BOTTOM DASHBOARD (40% Height) -->
    <footer class="utility-dashboard">
        
        <!-- LEFT: BACKGROUND THEME (50% Width) -->
        <div class="dash-section bg-gallery-section">
            <label class="compact-label">Background Theme Gallery</label>
            <div id="bgSelector" class="bg-gallery-matrix">
                <!-- Backgrounds injected here -->
            </div>
        </div>

        <!-- RIGHT: CONTROLS (50% Width) -->
        <div class="dash-section controls-section">
            <div class="align-block">
                <label class="compact-label">Text Alignment</label>
                <select id="slideAlign" class="st-select">
                    <option value="center">Center Aligned</option>
                    <option value="left">Left Aligned</option>
                </select>
            </div>

            <div class="sliders-block">
                <label class="compact-label">Positioning & Gaps</label>
                <div class="sliders-grid">
                    <div class="slider-box"><span>Title Y%</span><input type="range" id="yTitle" min="0" max="100" value="8"></div>
                    <div class="slider-box"><span>Lyrics Y%</span><input type="range" id="yLyrics" min="0" max="100" value="30"></div>
                    <div class="slider-box"><span>Copyright Y%</span><input type="range" id="yCopy" min="0" max="100" value="88"></div>
                    <div class="slider-box"><span>Chord Gap</span><input type="range" id="chordGap" min="0" max="50" value="5"></div>
                </div>
            </div>
        </div>
    </footer>
</div>

<script src="script.js"></script>
</body>
</html>
