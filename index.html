<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Song Studio Pro</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/pptxgenjs@3.12.0/dist/pptxgen.bundle.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>

<div class="app-container">
    
    <!-- TOP: CONTENT & POSITION PANEL -->
    <header class="control-panel">
        <div class="panel-header">
            <h1 class="brand">Song Studio <span class="version-badge">v1.2.8-DEBUG</span></h1>
            <button id="downloadBtn" class="generate-btn">Download PowerPoint</button>
        </div>

        <div class="panel-grid">
            <div class="input-main">
                <div class="input-row">
                    <input type="text" id="valTitle" value="Amazing Grace" placeholder="Song Title" class="st-input">
                    <input type="text" id="valCopy" value="© 2024 Public Domain" placeholder="Copyright Info" class="st-input">
                </div>
                <textarea id="valLyrics" rows="6" class="st-textarea" placeholder="Enter chords and lyrics here...">[Verse 1]
G              C                    G            D
Amazing Grace, how sweet the sound</textarea>
            </div>

            <div class="sliders-strip">
                <div class="slider-box"><span>Title Y%</span><input type="range" id="yTitle" min="0" max="100" value="8"></div>
                <div class="slider-box"><span>Lyrics Y%</span><input type="range" id="yLyrics" min="0" max="100" value="30"></div>
                <div class="slider-box"><span>Copyright Y%</span><input type="range" id="yCopy" min="0" max="100" value="88"></div>
                <div class="slider-box"><span>Chord Gap</span><input type="range" id="chordGap" min="0" max="50" value="0"></div>
            </div>
        </div>
    </header>

    <!-- BOTTOM AREA -->
    <main class="stage-container">
        
        <!-- Sidebar for Theme/Alignment (MOVED TO LEFT) -->
        <aside class="design-sidebar">
            <div class="sidebar-item">
                <label>Alignment</label>
                <select id="slideAlign" class="st-select">
                    <option value="center">Center Aligned</option>
                    <option value="left">Left Aligned</option>
                </select>
            </div>
            <div class="sidebar-item">
                <label>Background Theme</label>
                <div id="bgSelector" class="bg-vertical-grid"></div>
            </div>
        </aside>

        <!-- Main Slide View (NOW ON RIGHT) -->
        <div class="preview-stage">
            <div class="slide-wrapper">
                <div id="slideMock" class="slide-mock">
                    <div id="prevTitle" class="element"></div>
                    <div id="prevLyrics" class="element"></div>
                    <div id="prevCopy" class="element"></div>
                </div>
                <p class="stage-label">Live Preview (16:9 Aspect Ratio)</p>
            </div>
        </div>
        
    </main>
</div>

<script src="script.js"></script>
</body>
</html>
