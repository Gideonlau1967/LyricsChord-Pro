<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Song Studio Pro</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/pptxgenjs@3.12.0/dist/pptxgen.bundle.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>

<div class="app-container">
    
    <!-- TOP: CONTENT & POSITION PANEL -->
    <header class="control-panel">
        <div class="panel-header">
            <h1 class="brand">Song Studio <span class="version-badge">v1.2.9-DEBUG</span></h1>
            <button id="downloadBtn" class="generate-btn">Download PowerPoint</button>
        </div>

        <div class="panel-grid">
            <!-- Column 1: High-Focus Lyrics Area -->
            <div class="lyrics-col">
                <label class="compact-label">Chords & Lyrics (12-Line Editor)</label>
                <textarea id="valLyrics" rows="12" class="st-textarea" placeholder="Enter chords and lyrics here...">[Verse 1]
G              C                    G            D
Amazing Grace, how sweet the sound</textarea>
            </div>

            <!-- Column 2: Meta & Positioning (Balanced) -->
            <div class="meta-col">
                <div class="field-stack">
                    <div class="field-item">
                        <label class="compact-label">Song Title</label>
                        <input type="text" id="valTitle" value="Amazing Grace" class="st-input">
                    </div>
                    <div class="field-item">
                        <label class="compact-label">Copyright Info</label>
                        <input type="text" id="valCopy" value="© 2024 Public Domain" class="st-input">
                    </div>
                </div>

                <div class="sliders-stack">
                    <label class="compact-label">Slide Positioning</label>
                    <div class="slider-box"><span>Title Y%</span><input type="range" id="yTitle" min="0" max="100" value="3"></div>
                    <div class="slider-box"><span>Lyrics Y%</span><input type="range" id="yLyrics" min="0" max="100" value="20"></div>
                    <div class="slider-box"><span>Copyright Y%</span><input type="range" id="yCopy" min="0" max="100" value="93"></div>
                    <div class="slider-box"><span>Chord Gap</span><input type="range" id="chordGap" min="0" max="50" value="5"></div>
                </div>
            </div>
        </div>
    </header>

    <!-- BOTTOM: STAGE -->
    <main class="stage-container">
        
        <!-- SIDEBAR: DESIGN -->
        <aside class="design-sidebar">
            <div class="sidebar-item">
                <label class="compact-label">Alignment</label>
                <select id="slideAlign" class="st-select">
                    <option value="center">Center Aligned</option>
                    <option value="left">Left Aligned</option>
                </select>
            </div>
            
            <div class="sidebar-item">
                <label class="compact-label">Background Theme</label>
                <!-- 2-Column Matrix -->
                <div id="bgSelector" class="bg-matrix"></div>
            </div>
        </aside>

        <!-- PREVIEW: MAXIMIZED -->
        <div class="preview-stage">
            <div class="slide-wrapper">
                <div id="slideMock" class="slide-mock">
                    <div id="prevTitle" class="element"></div>
                    <div id="prevLyrics" class="element"></div>
                    <div id="prevCopy" class="element"></div>
                </div>
                <p class="stage-label">Slide Preview (16:9)</p>
            </div>
        </div>
        
    </main>
</div>

<script src="script.js"></script>
</body>
</html>
