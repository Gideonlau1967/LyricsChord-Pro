<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Song PPTX Studio</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/pptxgenjs@3.12.0/dist/pptxgen.bundle.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>

    <div class="app-wrapper">
        <!-- LEFT: CONTROLS -->
        <aside class="sidebar">
            <div class="brand-container">
                <h2 class="brand">Song PPTX Studio</h2>
                <!-- VERSION DISPLAY ADDED HERE -->
                <span id="appVersion" class="version-badge"></span>
            </div>
            
            <div class="input-group">
                <input type="text" id="valTitle" value="Amazing Grace" placeholder="Song Title" class="main-input">
            </div>

            <div class="input-group">
                <textarea id="valLyrics" class="main-textarea" placeholder="[Verse 1]...">[Verse 1]
G              C                    G            D
Amazing Grace, how sweet the sound</textarea>
            </div>

            <div class="input-group">
                <input type="text" id="valCopy" value="© 2024 Public Domain" placeholder="Copyright Info" class="main-input">
            </div>

            <div class="settings-card">
                <label class="section-label">Backgrounds</label>
                <div id="bgSelector" class="bg-grid"></div>

                <label class="section-label">Alignment</label>
                <select id="slideAlign" class="main-select">
                    <option value="center">Center Aligned</option>
                    <option value="left">Left Aligned</option>
                </select>

                <label class="section-label">Positions & Spacing</label>
                <div class="slider-box">
                    <span>Title Y%</span>
                    <input type="range" id="yTitle" min="0" max="100" value="3.5">
                </div>
                <div class="slider-box">
                    <span>Lyrics Y%</span>
                    <input type="range" id="yLyrics" min="0" max="100" value="20">
                </div>
                <div class="slider-box">
                    <span>Copyright Y%</span>
                    <input type="range" id="yCopy" min="0" max="100" value="93">
                </div>
                <div class="slider-box">
                    <span>Chord Gap %</span>
                    <input type="range" id="chordGap" min="5" max="100" value="25">
                </div>
            </div>

            <button id="downloadBtn" class="generate-btn">Download PowerPoint</button>
            <p id="status"></p>
        </aside>

        <!-- RIGHT: LIVE PREVIEW -->
        <main class="preview-area">
            <div id="slideMock" class="slide-mock">
                <div id="prevTitle" class="element title-prev"></div>
                <div id="prevLyrics" class="element lyrics-prev"></div>
                <div id="prevCopy" class="element copy-prev"></div>
            </div>
            <p class="preview-hint">Live Preview (Approximation)</p>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
