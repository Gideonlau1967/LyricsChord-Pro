<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Song Studio Pro - Setlist Manager</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/pptxgenjs@3.12.0/dist/pptxgen.bundle.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

<div class="app-container">
    <header class="app-header">
        <div class="brand-group">
            <img src="assets/TOP-logo.png" alt="Logo" class="app-logo">
            <div class="brand-stack">
                <h1 class="brand">Setlist Manager</h1>
                <span class="version-badge" id="vBadge">V2.1-PRO</span>
            </div>
        </div>
    
        <div class="header-actions">
            <input type="file" id="importPptx" accept=".pptx" style="display: none;">
            <button onclick="document.getElementById('importPptx').click()" class="secondary-btn">Upload Setlist</button>
            <button id="downloadBtn" class="generate-btn">Download Full Setlist</button>
        </div>
    </header>

    <main class="workspace">
        <!-- LEFT: SETLIST & EDITOR -->
        <aside class="editor-side">
            <!-- SONG SELECTOR -->
            <div class="setlist-panel">
                <div class="gallery-header">
                    <label class="compact-label">Song List (<span id="songCount">1</span>)</label>
                    <div class="gallery-btns">
                        <button id="addSongBtn" class="st-btn-sm">+</button>
                        <button id="delSongBtn" class="st-btn-sm">×</button>
                    </div>
                </div>
                <div id="setlistItems" class="setlist-items"></div>
            </div>

            <!-- CURRENT SONG META -->
            <div class="meta-row" style="margin-top: 1.5vh;">
                <div style="flex: 1;">
                    <label class="compact-label">Current Song Title</label>
                    <input type="text" id="valTitle" value="Song Title" class="st-input">
                </div>
                <div style="flex: 1;">
                    <label class="compact-label">Copyright Info</label>
                    <input type="text" id="valCopy" value="© Copyright Info" class="st-input">
                </div>
            </div>
            
            <div class="lyrics-container">
                <label class="compact-label">Lyrics & Chords Editor</label>
                <textarea id="valLyrics" class="st-textarea" placeholder="Paste chords/lyrics here..."></textarea>
            </div>
        </aside>

        <!-- RIGHT: PREVIEW STAGE -->
        <section class="preview-side">
            <div class="slide-wrapper" id="fullscreenWrapper">
                <div id="slideMock" class="slide-mock">
                    <div id="prevTitle" class="element"></div>
                    <div id="prevLyrics" class="element"></div>
                    <div id="prevCopy" class="element"></div>
                </div>
                <div class="preview-nav">
                    <button id="prevSlide" class="nav-btn">⟵</button>
                    <span id="slideIndicator">Slide 1 / 1</span>
                    <button id="nextSlide" class="nav-btn">⟶</button>
                    <button id="fullscreenBtn" class="nav-btn" title="Fullscreen">⛶</button>
                </div>
            </div>
        </section>
    </main>

    <footer class="utility-dashboard">
        <div class="dash-section bg-gallery-section">
            <div class="gallery-header">
                <label class="compact-label">Background Gallery</label>
                <div class="gallery-btns">
                    <button id="btnBgUp" class="st-btn-sm">▲</button>
                    <button id="btnBgDown" class="st-btn-sm">▼</button>
                </div>
            </div>
            <div id="bgSelector" class="bg-gallery-matrix"></div>
        </div>

        <div class="dash-section controls-section">
            <div class="meta-row">
                <div style="flex: 1.2;">
                    <label class="compact-label">Text Colors</label>
                    <div class="color-grid">
                        <div class="color-item"><span>Title</span><input type="color" id="colTitle" value="#000000"></div>
                        <div class="color-item"><span>Lyrics</span><input type="color" id="colLyrics" value="#000000"></div>
                        <div class="color-item"><span>Chords</span><input type="color" id="colChords" value="#64748b"></div>
                        <div class="color-item"><span>Copy</span><input type="color" id="colCopy" value="#000000"></div>
                    </div>
                </div>
                <div style="flex: 1.8;">
                    <label class="compact-label">Transpose (Current Song Only)</label>
                    <div class="transpose-controls">
                        <button id="btnDown" class="st-btn-sm">-1</button>
                        <span id="keyShift">Shift: 0</span>
                        <button id="btnUp" class="st-btn-sm">+1</button>
                        <select id="slideAlign" class="st-select" style="margin-left: 10px;">
                            <option value="center">Center</option>
                            <option value="left">Left</option>
                        </select>
                    </div>
                </div>
            </div>

            <div class="sliders-block">
                <label class="compact-label">Global Layout Adjustments</label>
                <div class="sliders-grid">
                    <div class="slider-box"><span>Title Y%</span><input type="range" id="yTitle" min="0" max="100" value="2"></div>
                    <div class="slider-box"><span>Lyrics Y%</span><input type="range" id="yLyrics" min="0" max="100" value="20"></div>
                    <div class="slider-box"><span>Copy Y%</span><input type="range" id="yCopy" min="0" max="100" value="93"></div>
                    <div class="slider-box"><span>Chord Gap</span><input type="range" id="chordGap" min="0" max="30" value="8"></div>
                </div>
            </div>
        </div>
    </footer>
</div>
<script src="script.js"></script>
</body>
</html>
